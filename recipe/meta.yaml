{% set name = "identify" %}
{% set version = "2.6.19" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/pre-commit/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: b939a2e57f1085886aab677c7b78d07ca02bf1186c8aeaa12021b596229e5195

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed
  entry_points:
    - identify-cli = identify.cli:main
  skip: true  # [py<310]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python
    - ukkonen

test:
  imports:
    - identify
  requires:
    - pip
    - pytest
  source_files:
    - LICENSE
    - tests
    - setup.py
  commands:
    - pip check
    - identify-cli --help
    - pytest tests  # [not win]
    # Some tests fail on Windows because they assume a Unix
    # file system, so they shouldn't lead to a hard fail
    # `pytest tests || 1` does not seem to work, so we need
    # to start a new subshell to just exit
    - pytest tests || cmd /c "exit /B 0"  # [win]

about:
  home: https://github.com/pre-commit/identify
  summary: File identification library for Python
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    File identification library for Python.
  dev_url: https://github.com/pre-commit/identify
  doc_url: https://github.com/pre-commit/identify

extra:
  recipe-maintainers:
    - nicoddemus
    - tdegeus
    - deadsnakes-issues-bot
